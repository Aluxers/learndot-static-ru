<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сертификаты — LearnDot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

    
    <div class="dash-wrap">
        <div id="dashTopbar"></div>
        <div id="dashSidebar"></div>
        <main class="dash-content">

            <div class="page-header">
                <h1>Сертификаты</h1>
                <p>Сертификаты за пройденные курсы.</p>
            </div>
            <div id="certGrid"></div>

        </main>
    </div>

    <script src="js/theme.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/data.js"></script>
    <script src="js/main.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', function () {

        
        if (!LearnDot.auth.requireRole(['student'])) return;

        
        renderDashTopbar('dashTopbar', 'Кабинет студента');
        renderDashSidebar('dashSidebar', 'student', 'certificates');
        
        if (getUserCertificates().length === 0) {
            document.getElementById('certGrid').innerHTML =
                '<div class="empty-state">' +
                    '<span class="empty-icon">🎓</span>' +
                    '<h3>Пока нет сертификатов</h3>' +
                    '<p>Завершите курс, чтобы получить первый сертификат.</p>' +
                '</div>';
            return;
        }

        
        var html = '';
        for (var i = 0; i < getUserCertificates().length; i++) {
            var cert = getUserCertificates()[i];
            html +=
                '<div class="card card-flush">' +
                    '<div class="cert-preview">' +
                        '<div class="cert-frame">' +
                            '<p class="cert-label">Сертификат об окончании</p>' +
                            '<h3 class="cert-course">' + cert.courseName + '</h3>' +
                            '<p class="cert-student">Выдан <strong>' + cert.studentName + '</strong></p>' +
                            '<p class="cert-teacher">Преподаватель: ' + cert.instructor + '</p>' +
                            '<div class="cert-line"></div>' +
                        '</div>' +
                    '</div>' +
                    '<div class="cert-body">' +
                        '<div class="flex justify-between mb-12 cert-meta">' +
                            '<span>Дата: ' + formatDate(cert.issueDate, 'long') + '</span>' +
                            '<span>' + cert.certificateNumber + '</span>' +
                        '</div>' +
                        '<div class="flex gap-8">' +
                            '<button class="btn btn-primary btn-sm btn-flex">Скачать PDF</button>' +
                            '<button class="btn btn-outline btn-sm btn-flex">Поделиться</button>' +
                        '</div>' +
                    '</div>' +
                '</div>';
        }
        document.getElementById('certGrid').innerHTML = '<div class="grid grid-2">' + html + '</div>';

    });
    </script>
</body>
</html>
