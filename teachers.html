<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Преподаватели — LearnDot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Шапка -->
    <div id="header-root"></div>

    <main class="page-content">
        <div class="container">
            <section class="section">
                <div class="section-title">
                    <h2 data-lang="teachersPageTitle">Наши преподаватели</h2>
                    <p data-lang="teachersPageText">Профессионалы индустрии, создающие и ведущие курсы.</p>
                </div>

                <!-- Карточки преподавателей -->
                <div class="grid grid-2" id="teacherGrid"></div>
            </section>
        </div>

        <!-- Призыв к действию -->
        <div id="cta"></div>
    </main>

    <!-- Подвал -->
    <div id="footer-root"></div>

    <script src="js/theme.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/data.js"></script>
    <script src="js/main.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', function () {

        // ===== Карточки преподавателей =====
        var html = '';

        for (var i = 0; i < DATA.teachers.length; i++) {
            var teacher = DATA.teachers[i];

            // Рисуем теги специализации
            var specializations = teacher.specialization.split(', ');
            var tagsHtml = '';
            for (var j = 0; j < specializations.length; j++) {
                tagsHtml += '<span class="badge badge-primary">' + specializations[j] + '</span>';
            }

            // Рисуем ссылки на курсы преподавателя
            var courseLinks = '';
            for (var j = 0; j < DATA.courses.length; j++) {
                var c = DATA.courses[j];
                // Проверяем, принадлежит ли курс этому преподавателю
                if (teacher.courses.indexOf(c.id) !== -1) {
                    courseLinks += '<a href="course-details.html?id=' + c.id + '" class="teacher-course-link">' + c.title + ' →</a><br>';
                }
            }

            // Имя преподавателя (только первое слово) для заголовка курсов
            var firstName = teacher.name.split(' ')[0];

            html +=
                '<div class="card teacher-full-card">' +
                    '<div class="teacher-full-card__top">' +
                        '<div class="teacher-avatar"><img src="' + (teacher.avatar || 'images/avatars/default.jpg') + '" alt=""></div>' +
                        '<h3 class="mb-4">' + teacher.name + '</h3>' +
                        '<p class="teacher-full-card__role">' + teacher.role + '</p>' +
                        '<div class="tags tags-centered">' + tagsHtml + '</div>' +
                        '<p class="teacher-full-card__bio">' + teacher.bio + '</p>' +
                    '</div>' +
                    '<div class="teacher-full-card__bottom">' +
                        '<p class="teacher-full-card__courses-title">' + t('teacherCourses') + ' ' + firstName + '</p>' +
                        courseLinks +
                    '</div>' +
                '</div>';
        }

        document.getElementById('teacherGrid').innerHTML = html;

        // Блок CTA
        document.getElementById('cta').innerHTML = renderCTA(
            t('teacherCtaTitle'),
            t('teacherCtaText')
        );
    });

    </script>
</body>
</html>
