<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель администратора — LearnDot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

    <!-- Обёртка панели администратора -->
    <div class="dash-wrap">
        <div id="dashTopbar"></div>
        <div id="dashSidebar"></div>
        <main class="dash-content">

            <div class="page-header">
                <h1 data-lang="adminDashboard">Панель администратора</h1>
                <p data-lang="platformOverview">Обзор платформы.</p>
            </div>

            <!-- Статистика -->
            <div class="stats-grid stats-grid-3" id="adStats"></div>

            <!-- Топ курсов -->
            <h3 class="dash-section-title" data-lang="topCourses">Топ курсов</h3>
            <div class="table-wrap mb-32">
                <table class="data-table">
                    <thead><tr><th>#</th><th data-lang="courses">Курс</th><th data-lang="students">Студенты</th><th data-lang="revenue">Доход</th><th data-lang="rating">Рейтинг</th></tr></thead>
                    <tbody id="topTable"></tbody>
                </table>
            </div>

            <!-- Последние платежи -->
            <h3 class="dash-section-title" data-lang="lastPayments">Последние платежи</h3>
            <div class="table-wrap">
                <table class="data-table">
                    <thead><tr><th data-lang="user">Пользователь</th><th data-lang="courses">Курс</th><th data-lang="amount">Сумма</th><th data-lang="date">Дата</th><th data-lang="status">Статус</th></tr></thead>
                    <tbody id="payTable"></tbody>
                </table>
            </div>

        </main>
    </div>

    <script src="js/theme.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/data.js"></script>
    <script src="js/main.js"></script>
    <script>

        document.addEventListener('DOMContentLoaded', function () {

        // ===== Проверяем роль =====
        if (!LearnDot.auth.requireRole(['admin'])) return;

        // ===== Рисуем верхнюю панель и боковое меню =====
        renderDashTopbar('dashTopbar', t('adminDashboard'));
        renderDashSidebar('dashSidebar', 'admin', 'dashboard');
        
        // ===== Статистика платформы =====
        var a = DATA.analytics;

        // Считаем общий доход
        var totalRevenue = 0;
        for (var i = 0; i < DATA.allPayments.length; i++) {
            if (DATA.allPayments[i].status === 'completed') {
                totalRevenue += DATA.allPayments[i].amount;
            }
        }

        // Считаем ожидающие модерации
        var pendingReviews = 0;
        for (var i = 0; i < DATA.adminReviews.length; i++) {
            if (DATA.adminReviews[i].status === 'pending') pendingReviews++;
        }

        document.getElementById('adStats').innerHTML = renderStatCards([
            { v: a.users.total, l: t('users') },
            { v: a.users.students, l: t('students') },
            { v: a.users.teachers, l: t('teachers') },
            { v: a.courses.total, l: t('courses') },
            { v: totalRevenue.toLocaleString() + ' ₸', l: t('revenue') },
            { v: pendingReviews, l: t('waitModeration') }
        ]);

        // ===== Топ курсов =====
        var topHtml = '';
        for (var i = 0; i < a.topCourses.length; i++) {
            var c = a.topCourses[i];
            var revenueText = c.revenue === 0 ? t('free') : c.revenue.toLocaleString() + ' ₸';
            topHtml +=
                '<tr>' +
                    '<td class="td-rank">' + (i + 1) + '</td>' +
                    '<td class="td-name">' + c.title + '</td>' +
                    '<td>' + c.students.toLocaleString() + '</td>' +
                    '<td>' + revenueText + '</td>' +
                    '<td>⭐ ' + c.rating + '</td>' +
                '</tr>';
        }
        document.getElementById('topTable').innerHTML = topHtml;

        // ===== Последние платежи =====
        var payHtml = '';
        var payCount = Math.min(5, DATA.allPayments.length);
        for (var i = 0; i < payCount; i++) {
            var p = DATA.allPayments[i];
            var statusBadge = p.status === 'completed' ? 'badge-success' : 'badge-danger';
            var statusText = p.status === 'completed' ? t('paid') : t('refunded');
            payHtml +=
                '<tr>' +
                    '<td class="td-name">' + p.user + '</td>' +
                    '<td class="td-muted">' + p.course + '</td>' +
                    '<td class="td-amount">$' + p.amount + '</td>' +
                    '<td class="td-muted">' + formatDate(p.date) + '</td>' +
                    '<td><span class="badge ' + statusBadge + '">' + statusText + '</span></td>' +
                '</tr>';
        }
        document.getElementById('payTable').innerHTML = payHtml;

    });
    </script>
</body>
</html>
