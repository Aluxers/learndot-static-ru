<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Проверка работ — LearnDot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

    <!-- Обёртка кабинета -->
    <div class="dash-wrap">
        <div id="dashTopbar"></div>
        <div id="dashSidebar"></div>
        <main class="dash-content">

            <div class="page-header">
                <h1>Проверка работ</h1>
                <p>Оценивайте задания студентов.</p>
            </div>

            <!-- Статистика -->
            <div class="stats-grid stats-grid-3 mb-24" id="arStats"></div>

            <!-- Фильтры -->
            <div class="flex gap-8 flex-wrap mb-20" id="arFilters"></div>

            <!-- Список работ -->
            <div class="flex flex-col gap-12" id="arList"></div>

        </main>
    </div>

    <script src="js/theme.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/data.js"></script>
    <script src="js/main.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', function () {
        // Проверяем роль
        if (!LearnDot.auth.requireRole(['teacher'])) return;

        // Рисуем шапку и меню
        renderDashTopbar('dashTopbar', 'Кабинет преподавателя');
        renderDashSidebar('dashSidebar', 'teacher', 'reviews');

        
        // Копируем работы
        var subs = (function(){var _a=[];for(var _i=0;_i<getTeacherSubmissions().length;_i++){_a.push(Object.assign({},getTeacherSubmissions()[_i]));}return _a;})();
        var filter = 'all';

        // Названия фильтров
        var filterLabels = { all: 'Все', pending: 'Ожидают', reviewed: 'Проверено' };

        // Отрисовка
        function renderSubs() {
            var pendingC = (function(){var _c=0;for(var _i=0;_i<subs.length;_i++){if(subs[_i].status==='pending'){_c++;}}return _c;})();
            var reviewedC = (function(){var _c=0;for(var _i=0;_i<subs.length;_i++){if(subs[_i].status==='reviewed'){_c++;}}return _c;})();

            // Статистика
            document.getElementById('arStats').innerHTML = [
                { v: subs.length, l: 'Всего', c: '' },
                { v: pendingC, l: 'Ожидают', c: 'stat-value-warning' },
                { v: reviewedC, l: 'Проверено', c: 'stat-value-success' }
            ].map(function (s) {
                return '<div class="stat-card"><div class="stat-value ' + s.c + '">' + s.v + '</div><div class="stat-label">' + s.l + '</div></div>';
            }).join('');

            // Фильтры
            document.getElementById('arFilters').innerHTML = ['all', 'pending', 'reviewed'].map(function (f) {
                var cls = filter === f ? 'btn-primary' : 'btn-secondary';
                return '<button class="btn ' + cls + ' btn-sm" onclick="setFilter(\'' + f + '\')">' + filterLabels[f] + '</button>';
            }).join('');

            // Список работ
            var list = filter === 'all' ? subs : (function(){var _r=[];for(var _i=0;_i<subs.length;_i++){if(subs[_i].status===filter){_r.push(subs[_i]);}}return _r;})();

            document.getElementById('arList').innerHTML = list.map(function (s, i) {
                // Оценка
                var gradeHtml = s.grade !== null
                    ? '<span class="grade-text">' + s.grade + '/100</span>'
                    : '';

                // Статус
                var statusBadge = s.status === 'reviewed' ? 'badge-success' : 'badge-warning';
                var statusText = s.status === 'reviewed' ? 'Проверено' : 'Ожидает';

                // Обратная связь
                var feedbackHtml = '';
                if (s.feedback) {
                    feedbackHtml =
                        '<div class="feedback-box">' +
                            '<p class="feedback-label">Ваш комментарий</p>' +
                            '<p class="feedback-text">' + s.feedback + '</p>' +
                        '</div>';
                }

                return '' +
                    '<div class="card">' +
                        '<div class="flex justify-between items-center flex-wrap gap-12 mb-8">' +
                            '<div>' +
                                '<h4 class="card-title-sm-tight">' + s.studentName + '</h4>' +
                                '<p class="meta-text">' + s.assignmentTitle + ' · ' + s.courseName + '</p>' +
                            '</div>' +
                            '<div class="flex items-center gap-8">' +
                                gradeHtml +
                                '<span class="badge ' + statusBadge + '">' + statusText + '</span>' +
                            '</div>' +
                        '</div>' +
                        feedbackHtml +
                        '<div class="flex gap-8">' +
                            '<button class="btn btn-primary btn-sm" onclick="reviewSub(' + i + ')">Оценить</button>' +
                        '</div>' +
                    '</div>';
            }).join('');
        }

        // Переключение фильтра
        window.setFilter = function (f) {
            filter = f;
            renderSubs();
        };

        // Оценивание работы
        window.reviewSub = function (i) {
            var grade = prompt('Введите оценку (0-100):');
            if (!grade) return;
            var feedback = prompt('Комментарий:') || '';
            subs[i].grade = parseInt(grade);
            subs[i].feedback = feedback;
            subs[i].status = 'reviewed';
            renderSubs();
        };

        renderSubs();

    });
    </script>
</body>
</html>
