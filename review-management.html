<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Модерация отзывов — LearnDot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

    <!-- Обёртка панели администратора -->
    <div class="dash-wrap">
        <div id="dashTopbar"></div>
        <div id="dashSidebar"></div>
        <main class="dash-content">

            <div class="page-header">
                <h1>Модерация отзывов</h1>
                <p>Управление отзывами студентов.</p>
            </div>

            <!-- Статистика -->
            <div class="stats-grid stats-grid-3 mb-24" id="rmStats"></div>

            <!-- Фильтры -->
            <div class="flex gap-8 flex-wrap mb-20" id="rmFilters"></div>

            <!-- Список отзывов -->
            <div class="flex flex-col gap-12" id="rmList"></div>

        </main>
    </div>

    <script src="js/theme.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/data.js"></script>
    <script src="js/main.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', function () {
        // Проверяем роль администратора
        if (!LearnDot.auth.requireRole(['admin'])) return;

        // Рисуем шапку и боковое меню
        renderDashTopbar('dashTopbar', 'Панель администратора');
        renderDashSidebar('dashSidebar', 'admin', 'reviews');

        
        // Копируем отзывы
        var revs = (function(){var _a=[];for(var _i=0;_i<DATA.adminReviews.length;_i++){_a.push(Object.assign({},DATA.adminReviews[_i]));}return _a;})();
        var filter = 'all';

        var statusLabels = { approved: 'Одобрен', pending: 'Ожидает', hidden: 'Скрыт' };
        var filterLabels = { all: 'Все', pending: 'Ожидают', approved: 'Одобрено', hidden: 'Скрыто' };

        function renderRM() {
            // Подсчёт
            var counts = {
                all: revs.length,
                pending: (function(){var _c=0;for(var _i=0;_i<revs.length;_i++){if(revs[_i].status==='pending'){_c++;}}return _c;})(),
                approved: (function(){var _c=0;for(var _i=0;_i<revs.length;_i++){if(revs[_i].status==='approved'){_c++;}}return _c;})(),
                hidden: (function(){var _c=0;for(var _i=0;_i<revs.length;_i++){if(revs[_i].status==='hidden'){_c++;}}return _c;})()
            };

            // Статистика
            document.getElementById('rmStats').innerHTML = [
                { v: counts.all, l: 'Всего', c: '' },
                { v: counts.pending, l: 'Ожидают', c: 'stat-value-warning' },
                { v: counts.approved, l: 'Одобрено', c: 'stat-value-success' }
            ].map(function (s) {
                return '<div class="stat-card"><div class="stat-value ' + s.c + '">' + s.v + '</div><div class="stat-label">' + s.l + '</div></div>';
            }).join('');

            // Фильтры
            document.getElementById('rmFilters').innerHTML = ['all', 'pending', 'approved', 'hidden'].map(function (f) {
                var cls = filter === f ? 'btn-primary' : 'btn-secondary';
                return '<button class="btn ' + cls + ' btn-sm" onclick="setRmFilter(\'' + f + '\')">' +
                    filterLabels[f] + ' (' + (counts[f] || 0) + ')</button>';
            }).join('');

            // Список
            var list = filter === 'all' ? revs : (function(){var _r=[];for(var _i=0;_i<revs.length;_i++){if(revs[_i].status===filter){_r.push(revs[_i]);}}return _r;})();

            document.getElementById('rmList').innerHTML = list.map(function (r, i) {
                var statusBadge = r.status === 'approved' ? 'badge-success' : r.status === 'hidden' ? 'badge-danger' : 'badge-warning';

                // Кнопки модерации
                var btns = '';
                if (r.status !== 'approved') btns += '<button class="btn btn-primary btn-sm" onclick="setRevStatus(' + i + ',\'approved\')">Одобрить</button>';
                if (r.status !== 'hidden') btns += '<button class="btn btn-danger-outline btn-sm" onclick="setRevStatus(' + i + ',\'hidden\')">Скрыть</button>';
                if (r.status === 'hidden') btns += '<button class="btn btn-secondary btn-sm" onclick="setRevStatus(' + i + ',\'pending\')">Восстановить</button>';

                return '' +
                    '<div class="card">' +
                        '<div class="flex justify-between items-center flex-wrap gap-12 mb-8">' +
                            '<div>' +
                                '<h4 class="card-title-sm-tight">' + r.student + '</h4>' +
                                '<p class="meta-text">' + r.course + '</p>' +
                            '</div>' +
                            '<div class="flex items-center gap-8">' +
                                '<span class="review-stars-text">' + '⭐'.repeat(r.rating) + '</span>' +
                                '<span class="badge ' + statusBadge + '">' + (statusLabels[r.status] || r.status) + '</span>' +
                            '</div>' +
                        '</div>' +
                        '<p class="review-quote">«' + r.text + '»</p>' +
                        '<div class="flex justify-between items-center flex-wrap gap-8">' +
                            '<span class="review-mod-date">' + formatDate(r.date, 'long') + '</span>' +
                            '<div class="flex gap-8">' + btns + '</div>' +
                        '</div>' +
                    '</div>';
            }).join('');
        }

        window.setRmFilter = function (f) { filter = f; renderRM(); };
        window.setRevStatus = function (i, s) { revs[i].status = s; renderRM(); };
        renderRM();

    });
    </script>
</body>
</html>
