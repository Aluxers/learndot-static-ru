<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Задания — LearnDot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

    <!-- Обёртка кабинета -->
    <div class="dash-wrap">
        <div id="dashTopbar"></div>
        <div id="dashSidebar"></div>
        <main class="dash-content">

            <div class="page-header">
                <h1>Задания</h1>
                <p>Ваши курсовые задания.</p>
            </div>
            <div class="flex flex-col gap-12" id="assignList"></div>

        </main>
    </div>

    <script src="js/theme.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/data.js"></script>
    <script src="js/main.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', function () {

        // ===== Проверяем роль пользователя =====
        if (!LearnDot.auth.requireRole(['student'])) return;

        // ===== Рисуем мобильную шапку и боковое меню =====
        renderDashTopbar('dashTopbar', 'Кабинет студента');
        renderDashSidebar('dashSidebar', 'student', 'assignments');
        // ===== Задания =====
        var statusLabels = {
            graded:    { text: 'Оценено',   badge: 'badge-success' },
            submitted: { text: 'Отправлено', badge: 'badge-primary' },
            pending:   { text: 'Ожидает',    badge: 'badge-warning' }
        };

        var html = '';
        for (var i = 0; i < getUserAssignments().length; i++) {
            var a = getUserAssignments()[i];

            // Ищем курс
            var courseName = '';
            for (var j = 0; j < DATA.courses.length; j++) {
                if (DATA.courses[j].id === a.courseId) {
                    courseName = DATA.courses[j].title;
                    break;
                }
            }

            // Статус
            var st = statusLabels[a.status] || statusLabels.pending;

            // Блок комментария преподавателя
            var feedbackHtml = '';
            if (a.teacherComment) {
                feedbackHtml =
                    '<div class="feedback-box">' +
                        '<p class="feedback-label">Комментарий</p>' +
                        '<p class="feedback-text">' + a.teacherComment + '</p>' +
                    '</div>';
            }

            // Оценка
            var gradeHtml = '';
            if (a.grade !== null) {
                gradeHtml = '<span class="assign-grade">Оценка: ' + a.grade + '/100</span>';
            }

            // Дата сдачи
            var submittedHtml = '';
            if (a.submittedDate) {
                submittedHtml = '<span>Сдано: ' + formatDate(a.submittedDate) + '</span>';
            }

            // Кнопка загрузки
            var uploadHtml = '';
            if (a.status === 'pending') {
                uploadHtml = '<button class="btn btn-primary btn-sm">Загрузить работу</button>';
            }

            html +=
                '<div class="card">' +
                    '<div class="flex justify-between items-center flex-wrap gap-12 mb-8">' +
                        '<div>' +
                            '<h4 class="card-title-sm-tight">' + a.title + '</h4>' +
                            '<p class="meta-text">' + courseName + ' · ' + a.module + '</p>' +
                        '</div>' +
                        '<span class="badge ' + st.badge + '">' + st.text + '</span>' +
                    '</div>' +
                    '<div class="flex gap-24 flex-wrap mb-12 assign-meta">' +
                        '<span>Срок: ' + formatDate(a.dueDate) + '</span>' +
                        submittedHtml +
                        gradeHtml +
                    '</div>' +
                    feedbackHtml +
                    uploadHtml +
                '</div>';
        }
        document.getElementById('assignList').innerHTML = html;

    });
    </script>
</body>
</html>
