<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Забыли пароль — LearnDot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    
    <div id="header-root"></div>

    
    <main class="page-content">
        <div class="container">
            <section class="section">
                <div class="auth-wrap">
                    <div class="card auth-card" id="fpCard">

                        
                        <div class="auth-header">
                            <h2>Забыли пароль</h2>
                            <p>Введите email, и мы отправим ссылку для сброса.</p>
                        </div>

                        
                        <div class="auth-form">
                            <div class="form-group">
                                <label class="form-label">Email</label>
                                <input class="input" id="fpEmail" placeholder="you@example.com" type="email">
                            </div>
                            <button class="btn btn-primary btn-block" id="fpBtn">Отправить ссылку</button>
                        </div>

                        
                        <p class="auth-switch">
                            Вспомнили пароль? <a href="login.html">Войти</a>
                        </p>

                    </div>
                </div>
            </section>
        </div>
    </main>

    
    <div id="footer-root"></div>

    <script src="js/theme.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/data.js"></script>
    <script src="js/main.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', function () {

        
        document.getElementById('fpBtn').addEventListener('click', function () {

            
            document.getElementById('fpCard').innerHTML =
                '<div class="text-center form-success">' +
                    '<span class="auth-success-icon">📧</span>' +
                    '<h3 class="mb-8 system-title-success">Проверьте почту</h3>' +
                    '<p class="mb-20">Если аккаунт существует, мы отправили ссылку.</p>' +
                    '<a href="login.html" class="btn btn-primary">Вернуться ко входу</a>' +
                '</div>';
        });
    });
    </script>
</body>
</html>
