<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <title>Урок — LearnDot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/tasks.css">
</head>
<body>

    <!-- Обёртка кабинета -->
    <div class="dash-wrap">
        <div id="dashTopbar"></div>
        <div id="dashSidebar"></div>
        <main class="dash-content">
            <div id="lessonContent"></div>
        </main>
    </div>

    <script src="js/theme.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/data.js"></script>
    <script src="js/main.js"></script>
    <script src="js/tasks.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', function () {

        // ===== Проверяем роль =====
        if (!LearnDot.auth.requireRole(['student'])) return;

        // ===== Рисуем шапку и боковое меню =====
        renderDashTopbar('dashTopbar', 'Кабинет студента');
        renderDashSidebar('dashSidebar', 'student', 'courses');


        // ===== Получаем ID курса из URL =====
        var params = new URLSearchParams(window.location.search);
        var courseId = params.get('course') || 'ux-ui-design';


        // ===== Загружаем данные уроков для курса =====
        var modules = DATA.lessonsByModule[courseId];

        // Если для курса нет уроков — показываем заглушку
        if (!modules || modules.length === 0) {
            document.getElementById('lessonContent').innerHTML =
                '<div class="empty-state">' +
                    '<span class="empty-icon">📚</span>' +
                    '<h3>Уроки в разработке</h3>' +
                    '<p>Материалы для этого курса скоро появятся.</p>' +
                    '<a href="my-courses.html" class="btn btn-primary btn-sm mt-12">Мои курсы</a>' +
                '</div>';
            return;
        }


        // ===== Находим название курса =====
        var courseName = courseId;
        for (var i = 0; i < DATA.courses.length; i++) {
            if (DATA.courses[i].id === courseId) {
                courseName = DATA.courses[i].title;
                break;
            }
        }


        // ===== Собираем все уроки в плоский список =====
        var allLessons = [];
        for (var mi = 0; mi < modules.length; mi++) {
            for (var li = 0; li < modules[mi].lessons.length; li++) {
                allLessons.push(modules[mi].lessons[li]);
            }
        }


        // ===== Пройденные уроки (localStorage) =====
        var completedKey = 'learndot-completed-' + courseId;
        var completed = {};
        try {
            var saved = localStorage.getItem(completedKey);
            if (saved) completed = JSON.parse(saved);
        } catch (e) {}


        // ===== Текущий активный урок =====
        var activeId = params.get('lesson') || allLessons[0].id;


        // ==========================================================
        //   ГЛАВНАЯ ФУНКЦИЯ ОТРИСОВКИ
        // ==========================================================

        function renderLesson() {

            // Находим текущий урок
            var lesson = null;
            var lessonIndex = 0;
            for (var i = 0; i < allLessons.length; i++) {
                if (allLessons[i].id === activeId) {
                    lesson = allLessons[i];
                    lessonIndex = i;
                    break;
                }
            }
            if (!lesson) {
                lesson = allLessons[0];
                lessonIndex = 0;
            }

            // Прогресс
            var completedCount = 0;
            for (var key in completed) {
                if (completed[key]) completedCount++;
            }
            var progressPct = Math.round(completedCount / allLessons.length * 100);
            var isDone = completed[activeId] === true;


            // ==============================================
            //   САЙДБАР — список модулей и уроков
            // ==============================================

            var sideHtml =
                '<div class="lesson-sidebar-header">' +
                    '<h3 class="lesson-sidebar-title">' + courseName + '</h3>' +
                    renderProgressBar(progressPct) +
                '</div>' +
                '<div class="lesson-modules-wrap">';

            for (var mi = 0; mi < modules.length; mi++) {
                var mod = modules[mi];
                sideHtml += '<div class="lesson-module-group">';
                sideHtml += '<p class="lesson-module-label">Модуль ' + (mi + 1) + ': ' + mod.mod + '</p>';

                for (var li = 0; li < mod.lessons.length; li++) {
                    var l = mod.lessons[li];
                    var isActive = (l.id === activeId);
                    var isLessonDone = completed[l.id] === true;

                    var btnClass = 'lesson-item';
                    if (isActive) btnClass += ' active';
                    if (isLessonDone) btnClass += ' done';

                    var typeIcon = '▶️';
                    if (l.type === 'text') typeIcon = '📄';
                    if (l.type === 'practice') typeIcon = '✏️';

                    sideHtml +=
                        '<button class="' + btnClass + '" data-lid="' + l.id + '">' +
                            '<span class="lesson-check">' + (isLessonDone ? '✓' : '') + '</span>' +
                            '<span class="lesson-type-icon">' + typeIcon + '</span>' +
                            '<span class="lesson-item-info">' +
                                '<span>' + l.title + '</span>' +
                                '<span class="lesson-item-dur">' + l.dur + '</span>' +
                            '</span>' +
                        '</button>';
                }
                sideHtml += '</div>';
            }
            sideHtml += '</div>';


            // ==============================================
            //   ВИДЕО-БЛОК (YouTube iframe или заглушка)
            //
            //   videoId — ID видео на YouTube.
            //   Чтобы заменить видео:
            //   1. Откройте js/data.js
            //   2. Найдите нужный урок в DATA.lessonsByModule
            //   3. Обновите поле videoId
            //   Формат: часть ссылки после v= (например jbkSRLYSojo)
            // ==============================================

            function getYoutubeEmbedUrl(url) {
                if (!url) {
                    return '';
                }

                if (url.indexOf('youtube.com/embed/') !== -1) {
                    return url;
                }

                var videoId = '';

                if (url.indexOf('v=') !== -1) {
                    videoId = url.split('v=')[1].split('&')[0];
                } else if (url.indexOf('youtu.be/') !== -1) {
                    videoId = url.split('youtu.be/')[1].split('?')[0];
                } else {
                    videoId = url;
                }

                var embedUrl = 'https://www.youtube.com/embed/' + videoId + '?rel=0';

                if (location.protocol.indexOf('http') === 0) {
                    embedUrl += '&origin=' + encodeURIComponent(location.origin);
                }

                return embedUrl;
            }

            var videoUrl = lesson.videoUrl || lesson.videoId;
            var embedUrl = getYoutubeEmbedUrl(videoUrl);

            var videoHtml = '';
            if (embedUrl) {
                videoHtml =
                    '<div class="video-container">' +
                        '<iframe src="' + embedUrl + '" ' +
                            'allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" ' +
                            'referrerpolicy="strict-origin-when-cross-origin" ' +
                            'allowfullscreen></iframe>' +
                    '</div>';
            } else {
                videoHtml =
                    '<div class="video-container">' +
                        '<div class="video-placeholder-msg">Этот урок — текстовый.<br>Смотрите содержание ниже.</div>' +
                    '</div>';
            }


            // ==============================================
            //   ВКЛАДКИ: Видео / Текст / Практика
            // ==============================================

            var hasVideo = embedUrl ? true : false;
            var hasText = lesson.content ? true : false;
            var hasPractice = lesson.practice ? true : false;

            // Определяем активную вкладку по умолчанию
            var defaultTab = hasVideo ? 'video' : (hasText ? 'text' : 'practice');

            var tabsHtml =
                '<div class="lesson-tabs">';

            if (hasVideo) {
                tabsHtml += '<button class="lesson-tab' + (defaultTab === 'video' ? ' active' : '') + '" data-tab="video">▶ Видео</button>';
            }
            if (hasText) {
                tabsHtml += '<button class="lesson-tab' + (defaultTab === 'text' ? ' active' : '') + '" data-tab="text">📄 Текст урока</button>';
            }
            if (hasPractice) {
                tabsHtml += '<button class="lesson-tab" data-tab="practice">✏️ Практика</button>';
            }

            tabsHtml += '</div>';


            // Содержимое вкладок
            var tabContentHtml = '';

            if (hasVideo) {
                tabContentHtml += '<div class="lesson-tab-content' + (defaultTab === 'video' ? ' active' : '') + '" data-tab-content="video">' + videoHtml + '</div>';
            }
            if (hasText) {
                tabContentHtml += '<div class="lesson-tab-content' + (defaultTab === 'text' ? ' active' : '') + '" data-tab-content="text"><div class="lesson-text-block">' + lesson.content + '</div></div>';
            }
            if (hasPractice) {
                tabContentHtml += '<div class="lesson-tab-content" data-tab-content="practice"><div class="lesson-practice">' + lesson.practice + '</div></div>';
            }


            // ==============================================
            //   КНОПКА «ОТМЕТИТЬ ПРОЙДЕННЫМ»
            // ==============================================

            var completeBtnClass = isDone ? 'btn-secondary' : 'btn-primary';
            var completeBtnText = isDone ? '✓ Урок пройден' : 'Отметить пройденным';

            var completeBtnHtml =
                '<button class="btn ' + completeBtnClass + ' mb-24" id="completeBtn">' + completeBtnText + '</button>';


            // ==============================================
            //   НАВИГАЦИЯ ← →
            // ==============================================

            var prevBtn = '<span></span>';
            if (lessonIndex > 0) {
                prevBtn = '<button class="btn btn-outline btn-sm" data-lid="' + allLessons[lessonIndex - 1].id + '">← ' + allLessons[lessonIndex - 1].title + '</button>';
            }

            var nextBtn = '';
            if (lessonIndex < allLessons.length - 1) {
                nextBtn = '<button class="btn btn-primary btn-sm" data-lid="' + allLessons[lessonIndex + 1].id + '">' + allLessons[lessonIndex + 1].title + ' →</button>';
            } else {
                nextBtn = '<a href="my-courses.html" class="btn btn-primary btn-sm">Завершить курс →</a>';
            }


            // ==============================================
            //   СОБИРАЕМ СТРАНИЦУ
            // ==============================================

            var mainHtml =
                '<button class="lesson-mobile-toggle" id="toggleSidebarBtn">☰ Список уроков</button>' +
                '<h2 class="mb-4">' + lesson.title + '</h2>' +
                '<p class="meta-text mb-20">Модуль · ' + lesson.dur + ' · ' + (lesson.type === 'video' ? 'Видеоурок' : (lesson.type === 'text' ? 'Текстовый' : 'Практика')) + '</p>' +
                tabsHtml +
                tabContentHtml +
                completeBtnHtml +
                '<div class="flex justify-between flex-wrap gap-12">' + prevBtn + nextBtn + '</div>';

            document.getElementById('lessonContent').innerHTML =
                '<div class="lesson-layout">' +
                    '<aside class="lesson-sidebar" id="lSidebar">' + sideHtml + '</aside>' +
                    '<div class="lesson-content">' + mainHtml + '</div>' +
                '</div>';


            // ==============================================
            //   ОБРАБОТЧИКИ СОБЫТИЙ
            // ==============================================

            // Клик по уроку в сайдбаре
            var lessonBtns = document.querySelectorAll('.lesson-item[data-lid]');
            for (var i = 0; i < lessonBtns.length; i++) {
                lessonBtns[i].addEventListener('click', function () {
                    activeId = this.dataset.lid;
                    renderLesson();
                    window.scrollTo(0, 0);
                });
            }

            // Навигация ← →
            var navBtns = document.querySelectorAll('[data-lid]');
            for (var i = 0; i < navBtns.length; i++) {
                if (!navBtns[i].classList.contains('lesson-item')) {
                    navBtns[i].addEventListener('click', function () {
                        activeId = this.dataset.lid;
                        renderLesson();
                        window.scrollTo(0, 0);
                    });
                }
            }

            // Вкладки (Видео / Текст / Практика)
            var tabs = document.querySelectorAll('.lesson-tab');
            for (var i = 0; i < tabs.length; i++) {
                tabs[i].addEventListener('click', function () {
                    var tabName = this.dataset.tab;

                    // Убираем active со всех вкладок
                    var allTabs = document.querySelectorAll('.lesson-tab');
                    for (var j = 0; j < allTabs.length; j++) {
                        allTabs[j].classList.remove('active');
                    }
                    this.classList.add('active');

                    // Показываем нужный контент
                    var allContents = document.querySelectorAll('.lesson-tab-content');
                    for (var j = 0; j < allContents.length; j++) {
                        allContents[j].classList.remove('active');
                    }
                    var target = document.querySelector('[data-tab-content="' + tabName + '"]');
                    if (target) target.classList.add('active');
                });
            }

            // Кнопка «Отметить пройденным»
            var completeBtn = document.getElementById('completeBtn');
            if (completeBtn) {
                completeBtn.addEventListener('click', function () {
                    if (completed[activeId]) {
                        delete completed[activeId];
                    } else {
                        completed[activeId] = true;
                    }
                    try {
                        localStorage.setItem(completedKey, JSON.stringify(completed));
                    } catch (e) {}
                    renderLesson();
                });
            }

            // Мобильная кнопка списка уроков
            var toggleBtn = document.getElementById('toggleSidebarBtn');
            if (toggleBtn) {
                toggleBtn.addEventListener('click', function () {
                    var sb = document.getElementById('lSidebar');
                    if (sb) sb.classList.toggle('open');
                });
            }

            // Инициализируем интерактивные задания
            if (typeof initTasks === 'function') {
                initTasks();
            }
        }


        // ===== Первая отрисовка =====
        renderLesson();

    });
    </script>
</body>
</html>
