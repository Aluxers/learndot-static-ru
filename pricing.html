<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тарифы — LearnDot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    
    <div id="header-root"></div>

    
    <main class="page-content">
        <div class="container">
            <section class="section">
                <div class="section-title">
                    <h2 data-lang="pricingPageTitle">Простые и прозрачные тарифы</h2>
                    <p data-lang="pricingPageText">Выберите план под ваши цели. Отмена в любой момент.</p>
                </div>

                
                <div class="grid grid-3 plans-grid" id="plans"></div>
            </section>
        </div>

        
        <div id="cta"></div>
    </main>

    
    <div id="footer-root"></div>

    <script src="js/theme.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/data.js"></script>
    <script src="js/main.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', function () {

        
        
        
        var plans = [
            {
                name: 'Basic', price: 0, period: t('forever'),
                desc: 'Начните с бесплатных курсов.',
                highlight: false,
                features: [
                    'Доступ к бесплатным курсам',
                    'Базовый трекинг прогресса',
                    'Доступ к сообществу',
                    '~Сертификат',
                    '~Скачиваемые материалы',
                    '~Приоритетная поддержка'
                ]
            },
            {
                name: 'Pro', price: 19000, period: t('perMonth'),
                desc: 'Полный доступ ко всем курсам.',
                highlight: true,
                features: [
                    'Все курсы платформы',
                    'Расширенный прогресс',
                    'Доступ к сообществу',
                    'Сертификат',
                    'Скачиваемые материалы',
                    '~Приоритетная поддержка'
                ]
            },
            {
                name: 'Pro Team', price: 49000, period: t('perMonth'),
                desc: 'Для команд от 5 человек.',
                highlight: false,
                features: [
                    'Всё из Pro',
                    'Панель управления командой',
                    'Групповая аналитика',
                    'Индивидуальные треки',
                    'Массовая запись',
                    'Приоритетная поддержка'
                ]
            }
        ];


        
        var html = '';

        for (var i = 0; i < plans.length; i++) {
            var p = plans[i];

            
            var cardClass = '';
            if (p.highlight) {
                cardClass = ' highlighted';
            }

            
            var badgeHtml = '';
            if (p.highlight) {
                badgeHtml = '<span class="plan-popular">' + t('popular') + '</span>';
            }

            
            var priceText = t('free');
            if (p.price > 0) {
                priceText = p.price.toLocaleString() + ' ₸';
            }

            
            var periodHtml = '';
            if (p.price > 0) {
                periodHtml = ' <span class="plan-period">' + p.period + '</span>';
            }

            
            var btnText = t('start');
            if (p.highlight) {
                btnText = t('startPro');
            } else if (p.price > 0) {
                btnText = t('contact');
            }

            
            var btnClass = 'btn-outline';
            if (p.highlight) {
                btnClass = 'btn-primary';
            }

            
            var featsHtml = '';
            for (var j = 0; j < p.features.length; j++) {
                var feat = p.features[j];

                
                var isDisabled = feat[0] === '~';
                var text = isDisabled ? feat.slice(1) : feat;
                var icon = isDisabled ? '<span class="cross">—</span>' : '<span class="check">✓</span>';
                var disClass = isDisabled ? ' disabled' : '';

                featsHtml += '<div class="plan-feature' + disClass + '">' + icon + text + '</div>';
            }

            
            html +=
                '<div class="card plan-card' + cardClass + '">' +
                    badgeHtml +
                    '<h3 class="mb-12">' + p.name + '</h3>' +
                    '<div class="mb-8">' +
                        '<span class="plan-price">' + priceText + '</span>' +
                        periodHtml +
                    '</div>' +
                    '<p class="plan-desc">' + p.desc + '</p>' +
                    '<div class="plan-features">' + featsHtml + '</div>' +
                    '<a href="login.html" class="btn ' + btnClass + ' btn-block">' + btnText + '</a>' +
                '</div>';
        }

        document.getElementById('plans').innerHTML = html;

        
        document.getElementById('cta').innerHTML = renderCTA(
            t('notSureTitle'),
            t('notSureText')
        );
    });

    </script>
</body>
</html>
